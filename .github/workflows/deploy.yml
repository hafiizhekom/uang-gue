name: Build and Push to Registry

on:
  push:
    branches: [ main ] # Pastikan branch ini sesuai dengan branch prod lo

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Test Image
        run: |
          docker build -t uanggue-prod:latest .
          # Test apakah PHP jalan di dalam image
          docker run --rm uanggue-prod:latest php artisan --version

      - name: Log in to DigitalOcean Container Registry
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_TOKEN }}
      
      - name: Docker Login to DigitalOcean Registry
        run: echo ${{ secrets.DIGITALOCEAN_TOKEN }} | docker login registry.digitalocean.com -u ${{ secrets.DIGITALOCEAN_TOKEN }} --password-stdin

      - name: Push image to DigitalOcean Container Registry
        run: |
          docker tag uanggue-prod:latest registry.digitalocean.com/uang-gue-registry/api:latest
          docker push registry.digitalocean.com/uang-gue-registry/api:latest

      - name: Copy docker-compose.prod.yml to Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker-compose.prod.yml"
          target: "/root/uang-gue/"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /root/uang-gue

            # Definisiin nama image buat Docker Compose
            export DOCKER_IMAGE_NAME=registry.digitalocean.com/uang-gue-registry/api

            # Login registry di server agar bisa tarik image terbaru
            echo ${{ secrets.DIGITALOCEAN_TOKEN }} | docker login registry.digitalocean.com -u ${{ secrets.DIGITALOCEAN_TOKEN }} --password-stdin
            
            # Tarik "kaleng" aplikasi terbaru
            docker compose -f docker-compose.prod.yml pull
            
            # Jalankan aplikasi. --force-recreate memastikan container lama diganti yang baru.
            docker compose -f docker-compose.prod.yml up -d --force-recreate
            
            # Cleanup image lama biar storage droplet gak penuh
            docker image prune -f