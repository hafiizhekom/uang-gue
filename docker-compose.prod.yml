services:
  app:
    image: ${DOCKER_IMAGE_NAME}:${DOCKER_IMAGE_TAG:-latest}
    restart: always
    environment:
      APP_ENV: production
      APP_DEBUG: false
      APP_KEY: ${APP_KEY}
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DOCUMENT_ROOT: "/var/www/html/public"
      SERVER_NAME: :80
    command: ["frankenphp", "php-server", "--listen", ":80", "--root", "/var/www/html/public"]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - storage_data:/var/www/html/storage
    networks:
      - uangku-network
    depends_on:
      - mysql

  mysql:
    image: mariadb:10.6
    restart: always
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - uangku-network

networks:
  uangku-network:
    driver: bridge

volumes:
  storage_data:
  db_data: